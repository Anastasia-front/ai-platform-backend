upstream ai_platform_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;

    server_name backend.ai-platform.internal;

    client_max_body_size 100m;

    location / {
        proxy_pass http://ai_platform_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;

    server_name docs.ai-automation-platform.com;

    return 301 https://docs.ai-automation-platform.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name docs.ai-automation-platform.com;

    ssl_certificate /etc/nginx/ssl/backend-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/backend-origin.key;

    client_max_body_size 100m;

    location / {
        proxy_pass http://ai_platform_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
