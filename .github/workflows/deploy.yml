name: Deploy Backend

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}
  SSM_PARAMETER_PATH: ${{ vars.SSM_PARAMETER_PATH }}
  CONTAINER_NAME: ai-platform-backend
  PORT_MAPPING: 127.0.0.1:8000:8000
  CERT_PARAMETER: /ai-platform/nginx/origin_certificate
  KEY_PARAMETER: /ai-platform/nginx/origin_private_key
  NGINX_SITE_NAME: ai-platform-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t "$ECR_REPOSITORY:$IMAGE_TAG" .

      - name: Tag Docker image
        run: |
          docker tag "$ECR_REPOSITORY:$IMAGE_TAG" \
            "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Push Docker image
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Deploy to EC2 via SSM
        run: |
          NGINX_CONF_BASE64="$(base64 -w 0 deploy/nginx/ai-platform-backend.conf 2>/dev/null || base64 deploy/nginx/ai-platform-backend.conf | tr -d '\n')"

          cat > /tmp/deploy-backend.sh <<REMOTE
          #!/usr/bin/env bash
          set -Eeuo pipefail

          AWS_REGION="${AWS_REGION}"
          ECR_REGISTRY="${ECR_REGISTRY}"
          ECR_REPOSITORY="${ECR_REPOSITORY}"
          IMAGE_TAG="${IMAGE_TAG}"
          CONTAINER_NAME="${CONTAINER_NAME}"
          PORT_MAPPING="${PORT_MAPPING}"
          SSM_PARAMETER_PATH="${SSM_PARAMETER_PATH}"
          CERT_PARAMETER="${CERT_PARAMETER}"
          KEY_PARAMETER="${KEY_PARAMETER}"
          NGINX_SITE_NAME="${NGINX_SITE_NAME}"
          NGINX_CONF_BASE64="${NGINX_CONF_BASE64}"
          DEPLOY_DIR="/home/ubuntu/ai-platform-deploy"
          SSL_DIR="/etc/nginx/ssl"
          CERT_PATH="\$SSL_DIR/backend-origin.pem"
          KEY_PATH="\$SSL_DIR/backend-origin.key"
          SITE_AVAILABLE="/etc/nginx/sites-available/\$NGINX_SITE_NAME"
          SITE_ENABLED="/etc/nginx/sites-enabled/\$NGINX_SITE_NAME"

          install_nginx() {
            if command -v nginx >/dev/null 2>&1; then
              return
            fi

            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y nginx
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y nginx
            else
              echo "No supported package manager found for installing nginx" >&2
              exit 1
            fi
          }

          install_jq() {
            if command -v jq >/dev/null 2>&1; then
              return
            fi

            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y jq
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y jq
            else
              echo "No supported package manager found for installing jq" >&2
              exit 1
            fi
          }

          install_secret_file() {
            local parameter_name="\$1"
            local destination="\$2"
            local mode="\$3"
            local marker_regex="\$4"
            local tmp_file
            local tmp_destination

            tmp_file="\$(mktemp)"
            tmp_destination="\${destination}.tmp"
            trap 'rm -f "\$tmp_file"; sudo rm -f "\$tmp_destination"' RETURN
            set +x
            aws ssm get-parameter \
              --name "\$parameter_name" \
              --with-decryption \
              --region "\$AWS_REGION" \
              --query 'Parameter.Value' \
              --output text > "\$tmp_file"
            if [ ! -s "\$tmp_file" ]; then
              echo "SSM parameter \$parameter_name returned an empty value" >&2
              return 1
            fi
            if ! head -n 1 "\$tmp_file" | grep -Eq "\$marker_regex"; then
              echo "SSM parameter \$parameter_name does not look like the expected PEM type" >&2
              return 1
            fi
            sudo install -o root -g root -m "\$mode" "\$tmp_file" "\$tmp_destination"
            sudo mv "\$tmp_destination" "\$destination"
            rm -f "\$tmp_file"
            trap - RETURN
          }

          generate_env_file() {
            local params_json

            params_json="\$(mktemp)"
            trap 'rm -f "\$params_json"' RETURN
            aws ssm get-parameters-by-path \
              --path "\$SSM_PARAMETER_PATH" \
              --with-decryption \
              --region "\$AWS_REGION" \
              --recursive \
              --output json > "\$params_json"

            jq -r '.Parameters[] | select((.Name | contains("/nginx/")) | not) | if (.Value | test("[\\r\\n]")) then error("Refusing to write multiline SSM parameter to .env: " + .Name) else ((.Name | split("/") | last) + "=" + .Value) end' "\$params_json" > .env

            rm -f "\$params_json"
            trap - RETURN

            if grep -Eq 'origin_certificate|origin_private_key|BEGIN CERTIFICATE|BEGIN PRIVATE KEY' .env; then
              echo "Refusing to deploy because nginx secret material was written to .env" >&2
              exit 1
            fi
          }

          wait_for() {
            local description="\$1"
            local command="\$2"

            for i in \$(seq 1 20); do
              echo "\$description check attempt \$i..."
              if bash -c "\$command"; then
                echo "\$description is healthy"
                return 0
              fi
              docker logs --tail=50 "\$CONTAINER_NAME" || true
              sleep 3
            done

            echo "\$description check failed" >&2
            return 1
          }

          mkdir -p "\$DEPLOY_DIR"
          cd "\$DEPLOY_DIR"

          install_jq
          generate_env_file

          PREVIOUS_IMAGE="\$(docker inspect "\$CONTAINER_NAME" --format='{{.Config.Image}}' 2>/dev/null || true)"
          echo "\$PREVIOUS_IMAGE" > previous_image.txt

          aws ecr get-login-password --region "\$AWS_REGION" \
          | docker login --username AWS --password-stdin "\$ECR_REGISTRY"

          docker pull "\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG"

          install_nginx
          sudo install -d -m 700 -o root -g root "\$SSL_DIR"
          install_secret_file "\$CERT_PARAMETER" "\$CERT_PATH" 0644 '^-----BEGIN CERTIFICATE-----$'
          install_secret_file "\$KEY_PARAMETER" "\$KEY_PATH" 0600 '^-----BEGIN (RSA |EC )?PRIVATE KEY-----$'

          echo "\$NGINX_CONF_BASE64" | base64 -d > "\$DEPLOY_DIR/\$NGINX_SITE_NAME.conf"
          sudo install -d -m 755 -o root -g root /etc/nginx/sites-available /etc/nginx/sites-enabled
          sudo install -o root -g root -m 0644 "\$DEPLOY_DIR/\$NGINX_SITE_NAME.conf" "\$SITE_AVAILABLE"
          sudo ln -sfn "\$SITE_AVAILABLE" "\$SITE_ENABLED"
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t

          docker run --rm \
            --env-file .env \
            "\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG" \
            alembic upgrade head

          docker stop "\$CONTAINER_NAME" || true
          docker rm "\$CONTAINER_NAME" || true

          docker run -d \
            --name "\$CONTAINER_NAME" \
            --env-file .env \
            -p "\$PORT_MAPPING" \
            --restart unless-stopped \
            "\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG"

          if ! wait_for "Backend container" "curl --fail --silent --show-error --max-time 10 http://127.0.0.1:8000/health >/dev/null"; then
            docker ps -a
            docker logs --tail=100 "\$CONTAINER_NAME" || true
            FAILED_IMAGE="\$ECR_REGISTRY/\$ECR_REPOSITORY:\$IMAGE_TAG"
            docker stop "\$CONTAINER_NAME" || true
            docker rm "\$CONTAINER_NAME" || true
            PREVIOUS_IMAGE="\$(cat previous_image.txt)"
            if [ -n "\$PREVIOUS_IMAGE" ]; then
              docker run -d --name "\$CONTAINER_NAME" --env-file .env -p "\$PORT_MAPPING" --restart unless-stopped "\$PREVIOUS_IMAGE"
            fi
            docker image rm "\$FAILED_IMAGE" || true
            exit 1
          fi

          sudo nginx -t
          sudo systemctl enable nginx
          sudo systemctl restart nginx

          wait_for "Backend internal Nginx HTTP" "curl --fail --silent --show-error --max-time 10 --resolve backend.ai-platform.internal:80:127.0.0.1 http://backend.ai-platform.internal/health >/dev/null"
          wait_for "Backend docs Nginx HTTPS" "curl -k --fail --silent --show-error --max-time 10 --resolve docs.ai-automation-platform.com:443:127.0.0.1 https://docs.ai-automation-platform.com/docs >/dev/null"

          docker image prune -f
          REMOTE

          jq -n --arg cmd "$(cat /tmp/deploy-backend.sh)" '{commands:[$cmd],executionTimeout:["1800"]}' > /tmp/ssm-backend-parameters.json

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ai-platform backend with nginx origin TLS" \
            --timeout-seconds 1800 \
            --parameters file:///tmp/ssm-backend-parameters.json \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}"

          STATUS=$(aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed with status: $STATUS"
            exit 1
          fi
